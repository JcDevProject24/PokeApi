<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#cc0000" />

  <!-- SEO básico -->
  <meta name="description" content="Explora el mundo Pokémon: busca, filtra por tipo, generación o Pokédex y consulta estadísticas, habilidades y hábitat de cada Pokémon." />
  <meta name="author" content="Jorge Carrillo (JcDevProject24)" />

  <!-- Open Graph (redes sociales) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Pokédex" />
  <meta property="og:description" content="Explora el mundo Pokémon: busca, filtra por tipo, generación o Pokédex y consulta estadísticas, habilidades y hábitat de cada Pokémon." />
  <meta property="og:image" content="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" />

  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body>
  <!-- Cabecera principal -->
  <header>
    <h1>Pokédex</h1>

    <!-- Contenedor de filtros -->
    <div class="filtros">
      <!-- Buscador de Pokémon -->
      <div class="busqueda">
        <input type="text" id="busqueda" placeholder="Buscar pokémon..." autocomplete="off" />
        <ul id="sugerencias" class="oculto"></ul>
      </div>
      <!-- Filtro principal -->
      <select id="filtro">
        <option value="todo">Todos los pokemones</option>
        <option value="type">Tipo</option>
        <option value="pokedex">Pokédex</option>
        <option value="generation">Generación</option>
      </select>

      <!-- Selector secundario según filtro -->
      <select id="select">
        <option value="">Selecciona una opción</option>
      </select>
      <button id="resetFiltros">⟳</button>
    </div>
  </header>

  <main>
    <!-- Mensajes al usuario -->
    <div id="mensajes"></div>

    <!-- Resultados de Pokémon -->
    <div id="resultados"></div>
  </main>

  <!-- Modal de detalle de Pokémon -->
  <div id="modal" class="modal oculto">
    <div class="modal-contenido">
      <button id="cerrarModal">✕</button>
      <div id="modalDatos"></div>
    </div>
  </div>

  <script src="assets/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/DAS/Unidad_6/pokeapi/sw.js");
    }
  </script>
</body>

</html>
